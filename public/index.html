<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChoice | Grocery Comparison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <span class="logo-icon">🛒</span>
                <h1>SmartChoice</h1>
            </div>
            <p>Real-time grocery price comparison</p>
        </header>

        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="itemInput" placeholder="What are you looking for? (e.g. Apples)">
                <button onclick="searchProducts()" id="searchBtn">Compare Prices</button>
            </div>
        </section>

        <section id="summary-section" class="summary-section hidden">
            <h2>Price summary</h2>
            <p id="summary-text"></p>
        </section>

        <section id="matched-section" class="matched-section hidden">
            <h2>Similar products</h2>
            <div id="matched-results" class="matched-list"></div>
        </section>

        <main class="comparison-grid">
            <div class="store-column" id="woolies-col">
                <div class="store-brand woolies-brand">
                    <h2>Woolworths</h2>
                </div>
                <div id="woolworths-results" class="results-list">
                    <p class="status-text">Enter an item to see prices...</p>
                </div>
            </div>

            <div class="store-column" id="coles-col">
                <div class="store-brand coles-brand">
                    <h2>Coles</h2>
                </div>
                <div id="coles-results" class="results-list">
                    <p class="status-text">Enter an item to see prices...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
